# Upstream sync manifest
#
# Strategic-tool was snapshotted from carlorbiz-website on 10 Apr 2026.
# This manifest tells scripts/check-upstream-drift.mjs which paths to keep
# in sync with upstream, which to leave intentionally diverged, and which
# are local-only additions for the strategic-tool product.
#
# Run: npm run sync:check                 (read-only drift report)
#      npm run sync:apply -- <path>       (pull a specific upstream-ahead file
#                                          forward into our tree)
#
# Globs follow micromatch syntax. First-match wins, in order:
#   1. local_only  -> never touch (path exists only here OR we deliberately ignore)
#   2. diverged    -> never touch (we forked it; report drift but don't suggest pulls)
#   3. shared      -> drift-check tracks
# Anything not matched by any list is reported as "untracked" so you can decide.

upstream:
  repo: https://github.com/carlorbiz/carlorbiz-website
  local_path: ../carlorbiz-website   # relative to this repo's root
  pinned_sha: 381c7673b3dd4a4bbad88216a917b3f45e2d7154
  pinned_at: 2026-04-11

# Files the drift check ignores entirely. Two flavours:
#   (a) Strategic-tool-only files (engagement code, demo seeds, etc.)
#   (b) Files in upstream that we deliberately don't want here (carlorbiz-website
#       internal docs, _archive content, vendored cli caches, scratch files).
local_only:
  # Drift tooling itself
  - .upstream-snapshot
  - .upstream-sync.yml
  - scripts/check-upstream-drift.mjs

  # Strategic-tool docs
  - docs/migration-brief.md
  - docs/upstream-sync.md
  - docs/supabase-strategy.md
  - docs/extraction-plan.md

  # Upstream-only stuff we don't want pulled in
  - _archive/**
  - CLAUDE_CONTEXT.md
  - PLAN_UPDATE.md
  - carlorbiz-webpage.md
  - carlorbiz-website.md
  - temp.html
  - urls.txt
  - supabase/.temp/**

  # Strategic-tool feature surfaces — added below as we build them:
  # - client/src/pages/Engagement*.tsx
  # - client/src/pages/StageEditor.tsx
  # - client/src/components/engagement/**
  # - migrations/strategic-tool/**
  # - supabase/functions/st-*/**

# Files we have intentionally forked from upstream and never want overwritten.
# Drift-check will tell us if upstream changes them so we can decide whether
# to lift any of the changes by hand, but it won't suggest sync:apply.
diverged:
  # Identity & metadata
  - README.md
  - package.json                      # name differs (carlorbiz-strategic-tool)
  - package-lock.json                 # devDeps will diverge as we add tooling
  - .env.example                      # may add tool-specific env vars

  # App shell that we'll restructure for engagement routing
  - client/src/App.tsx                # routes will diverge
  - client/src/pages/Home.tsx         # landing page will be product-specific
  - client/src/pages/Admin.tsx        # admin panel will get stage-editor surfaces

  # Carlorbiz-website branded assets we'll replace with strategic-tool branding
  - client/index.html                 # page title, meta, social tags
  - client/public/manifest.json       # PWA name and icons
  - client/public/robots.txt
  - client/public/sitemap.xml
  - client/public/hero-logo.png
  - client/public/icon-192.png
  - client/public/icon-512.png
  - client/public/og-image.png
  - client/public/images/**           # all the carla-*.webp portraits etc.
  - client/public/prerendered/**      # prerendered Carlorbiz-website pages

  # Carlorbiz-website-specific copy/data/pages we'll either delete or replace
  - client/src/const.ts
  - client/src/data/campaigns.ts
  - client/src/pages/AboutMe.tsx
  - client/src/pages/CampaignLanding.tsx
  - client/src/pages/Contact.tsx
  - client/src/pages/Landing.tsx
  - client/src/pages/Services.tsx
  - client/supabase/seeds/services_page_tabs.sql

  # Cloudflare Worker for the carlorbiz-website contact form — strategic-tool
  # doesn't ship a worker (or will ship its own with a different purpose)
  - worker/**

  # Schema baseline — we'll layer st_* engagement tables on top
  - DEFINITIVE_MIGRATION.sql

